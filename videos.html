<!DOCTYPE html>

    <title>Vimantech - Our Products</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-section {
            padding-top: 120px;
            padding-bottom: 80px;
            text-align: center;
            background-color: #0d0d0d;
            min-height: 100vh;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .gallery-item {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: #1a1a1a;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(255, 153, 0, 0.4);
            border-color: #ff9900;
        }

        .gallery-item img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
        }
        .gallery-item video {
    width: 100%;
    height: 260px;
    object-fit: cover;
    display: block;
}

        .gallery-item p {
            background: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .gallery-item img { height: 220px; }
            .gallery-item video { height: 220px; }
        }
    </style>
</head>
