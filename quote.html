<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vimantech - Get a Quote</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        .quote-form-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 60px 20px;
        }

        .quote-form-section .container {
            max-width: 620px;
            width: 100%;
            margin: 0 auto;
        }

        .quote-form-section h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .quote-form-section .form-subtitle {
            text-align: center;
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 36px;
            letter-spacing: 0.5px;
        }

        #quote-form {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 44px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.07);
            box-shadow:
                0 0 40px rgba(139,92,246,0.08),
                0 20px 60px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        #quote-form::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,153,0,0.4), transparent);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 9px;
            color: #888;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .form-group label i {
            font-size: 14px;
            color: #ff9900;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="tel"],
        .form-group textarea {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background-color: rgba(255,255,255,0.04);
            color: #f0f0f0;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
            resize: none;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #444;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #ff9900;
            background-color: rgba(255,153,0,0.05);
            box-shadow: 0 0 0 3px rgba(255,153,0,0.12);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff9900, #e67e00);
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,153,0,0.25);
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            width: 0; height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: 0.5s;
        }

        .submit-btn:hover::before {
            width: 400px;
            height: 400px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 35px rgba(255,153,0,0.45);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .form-trust {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
        }

        .form-trust span {
            font-size: 0.78rem;
            color: #444;
            display: flex;
            align-items: center;
            gap: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-trust span i {
            font-size: 13px;
            color: #ff9900;
        }

        @media (max-width: 768px) {
            .quote-form-section {
                padding: 40px 16px;
            }
            #quote-form {
                padding: 28px 20px;
            }
            .form-trust {
                gap: 14px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">Vimantech</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html#services">Our Services</a></li>
                    <li><a href="index.html#about">About Us</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="main-content">
        <section class="quote-form-section">
            <div class="container">
                <h2>Get a Quote for Your E-Bike</h2>
                <p class="form-subtitle">Fill out this form and we'll get back to you with a personalised quote.</p>

                <form id="quote-form">

                    <div class="form-group">
                        <label for="name"><i class="ti ti-user"></i> Your name</label>
                        <input type="text" id="name" name="name" placeholder="Rahul Sharma" required>
                    </div>

                    <div class="form-group">
                        <label for="email"><i class="ti ti-mail"></i> Your email</label>
                        <input type="email" id="email" name="email" placeholder="rahul@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone"><i class="ti ti-phone"></i> Phone number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210">
                    </div>

                    <div class="form-group">
                        <label for="message"><i class="ti ti-message"></i> Tell us about your needs</label>
                        <textarea id="message" name="message" rows="4" placeholder="I have a Hero cycle and want 60km range..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="ti ti-send"></i> Get My Quote
                    </button>

                    <div class="form-trust">
                        <span><i class="ti ti-shield-check"></i> Secure</span>
                        <span><i class="ti ti-clock"></i> 24hr reply</span>
                        <span><i class="ti ti-star"></i> 5★ rated</span>
                    </div>

                </form>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
